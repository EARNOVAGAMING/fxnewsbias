<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Forecast — FXNewsBias</title>
<meta name="description" content="Daily forex forecast and bias analysis from FXNewsBias.">
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,sans-serif;background:#f8fafc;color:#1e293b;line-height:1.6;}
a{text-decoration:none;color:inherit;}

header{background:#0f172a;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.18);}
.header-inner{max-width:1280px;margin:0 auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo img{height:36px;}
nav ul{list-style:none;display:flex;gap:24px;}
nav a{text-decoration:none;color:#f1f5f9;font-weight:500;font-size:14px;}
nav a:hover,nav a.active{color:#60a5fa;}
.nav-actions{display:flex;gap:10px;align-items:center;}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}
.btn-outline{border:1px solid #334155;color:#f1f5f9;background:none;}
.btn-outline:hover{border-color:#60a5fa;color:#60a5fa;}
.btn-primary{background:#2563eb;color:#fff;border:none;}
.btn-primary:hover{background:#1d4ed8;}
.burger{background:none;border:none;cursor:pointer;width:40px;height:40px;display:none;}

.page{max-width:760px;margin:0 auto;padding:36px 20px 60px;}

.post-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.04);}
.post-img{width:100%;max-height:400px;object-fit:cover;display:block;}
.post-body{padding:28px 32px 36px;}
.post-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.post-date{font-size:12px;font-weight:600;color:#94a3b8;font-family:'JetBrains Mono',monospace;}
.bias-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.bias-bull{background:#d1fae5;color:#065f46;}
.bias-bear{background:#fee2e2;color:#991b1b;}
.bias-neut{background:#fef3c7;color:#92400e;}
.post-title{font-size:26px;font-weight:800;line-height:1.3;color:#0f172a;margin-bottom:16px;}
.pairs-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.pair-tag{background:#f1f5f9;color:#475569;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;}
.post-content{font-size:15px;color:#334155;line-height:1.85;white-space:pre-wrap;word-wrap:break-word;}
.post-content p{margin-bottom:14px;}
.post-footer{margin-top:28px;padding-top:18px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.post-author{font-size:12px;color:#94a3b8;}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#334155;transition:.15s;}
.share-btn:hover{border-color:#93c5fd;color:#1d4ed8;}

.share-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#e2e8f0;font-size:13px;font-weight:600;padding:10px 22px;border-radius:8px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:999;}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.loading-shimmer{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.error-box{text-align:center;padding:60px 20px;color:#94a3b8;}
.error-box h3{font-size:20px;font-weight:700;color:#475569;margin-bottom:8px;}

.more-section{margin-top:40px;}
.more-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:16px;}
.more-label::after{content:'';flex:1;height:1px;background:#e2e8f0;}
.more-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.more-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;display:block;color:inherit;transition:border-color .2s,box-shadow .2s;}
.more-card:hover{border-color:#93c5fd;box-shadow:0 2px 12px rgba(37,99,235,.08);}
.more-thumb{width:100%;height:110px;object-fit:cover;display:block;}
.more-thumb-ph{width:100%;height:110px;background:linear-gradient(135deg,#1e293b,#1e3a5f);display:flex;align-items:center;justify-content:center;font-size:24px;}
.more-card-body{padding:10px 12px 12px;}
.more-date{font-size:10px;font-weight:600;color:#94a3b8;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
.more-title{font-size:13px;font-weight:700;color:#0f172a;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

footer{background:#0f172a;color:#64748b;padding:28px 0;margin-top:48px;text-align:center;font-size:13px;}
footer a{color:#94a3b8;margin:0 10px;}
footer a:hover{color:#fff;}

@media(max-width:640px){
  .post-body{padding:20px;}
  .post-title{font-size:20px;}
  .more-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<style>nav>ul{display:none}.burger{display:flex!important;align-items:center;justify-content:center}</style>
<header>
  <div class="header-inner">
    <a href="/" class="logo"><img src="/logo-fxnb.png?v=2" alt="FX News Bias"></a>
    <nav>
      <ul>
        <li><a href="/">Markets</a></li>
        <li><a href="/currencies">Currencies</a></li>
        <li><a href="/pairs">Pairs</a></li>
        <li><a href="/calendar">Calendar</a></li>
        <li><a href="/news">News</a></li>
        <li><a href="/insight/">Insights</a></li>
        <li><a href="/forecast/" class="active">Forecast</a></li>
        <li><a href="/community">Community</a></li>
      </ul>
    </nav>
    <div class="nav-actions">
      <a href="/login" class="btn btn-outline">Login</a>
      <a href="/register" class="btn btn-primary">Register</a>
      <button class="burger">☰</button>
    </div>
  </div>
</header>

<div class="page">
  <div id="post-container">
    <div class="post-card">
      <div style="height:320px;" class="loading-shimmer"></div>
      <div class="post-body">
        <div style="height:20px;width:160px;margin-bottom:16px;" class="loading-shimmer"></div>
        <div style="height:32px;width:85%;margin-bottom:12px;" class="loading-shimmer"></div>
        <div style="height:16px;width:100%;margin-bottom:8px;" class="loading-shimmer"></div>
        <div style="height:16px;width:92%;margin-bottom:8px;" class="loading-shimmer"></div>
        <div style="height:16px;width:97%;" class="loading-shimmer"></div>
      </div>
    </div>
  </div>

  <div class="more-section" id="more-section" style="display:none;">
    <div class="more-label">📚 More Forecasts</div>
    <div class="more-grid" id="more-grid"></div>
    <div style="text-align:center;margin-top:16px;">
      <a href="/forecast/" style="font-size:13px;font-weight:700;color:#2563eb;">View all forecasts →</a>
    </div>
  </div>
</div>

<footer>
  <a href="/">Markets</a>
  <a href="/currencies">Currencies</a>
  <a href="/pairs">Pairs</a>
  <a href="/forecast/">Forecast</a>
  <a href="/news">News</a>
  <br><br>
  © 2026 FXNewsBias · <a href="/disclaimer">Disclaimer</a> · Not financial advice
</footer>

<div class="share-toast" id="share-toast">Link copied!</div>
<script src="/nav.js" defer></script>
<script src="/cookie.js" defer></script>
<script src="/analytics.js" defer></script>
<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const toast = document.getElementById('share-toast');
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}
window.sharePost = function(title) {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url)
      .then(() => showToast('Link copied!'))
      .catch(() => showToast('Copy: ' + url));
  }
};

const app = getApps().length ? getApps()[0] : initializeApp({
  apiKey: "AIzaSyD88nfD-GSk2icxgPMqOHOuLjCM19Zzso4",
  authDomain: "fxnewsbias.firebaseapp.com",
  projectId: "fxnewsbias",
  storageBucket: "fxnewsbias.firebasestorage.app",
  messagingSenderId: "414710041736",
  appId: "1:414710041736:web:00e79ccc58fdb94e98633d"
});
const db = getFirestore(app);

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function biasClass(b) {
  return b === 'Bullish' ? 'bias-bull' : b === 'Bearish' ? 'bias-bear' : 'bias-neut';
}
function biasIcon(b) {
  return b === 'Bullish' ? '🟢' : b === 'Bearish' ? '🔴' : b === 'Neutral' ? '🟡' : '';
}
function fmtDate(ts) {
  const d = ts && ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function fmtDateShort(ts) {
  const d = ts && ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}

const params = new URLSearchParams(location.search);
const postId = params.get('id');
const container = document.getElementById('post-container');

if (!postId) {
  container.innerHTML = `<div class="error-box"><h3>No forecast selected</h3><p><a href="/forecast/" style="color:#2563eb;">← Go back to all forecasts</a></p></div>`;
} else {
  (async () => {
    try {
      const snap = await getDoc(doc(db, 'forecasts', postId));
      if (!snap.exists()) {
        container.innerHTML = `<div class="error-box"><h3>Forecast not found</h3><p><a href="/forecast/" style="color:#2563eb;">← Go back to all forecasts</a></p></div>`;
        return;
      }
      const f = { id: snap.id, ...snap.data() };

      // Update page title + meta
      document.title = `${f.title} — FXNewsBias`;
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', f.title + ' — Daily forex forecast from FXNewsBias.');

      const pairsHtml = (f.pairs && f.pairs.length)
        ? `<div class="pairs-row">${f.pairs.map(p=>`<span class="pair-tag">${escHtml(p)}</span>`).join('')}</div>`
        : '';

      container.innerHTML = `
        <div class="post-card">
          ${f.imageUrl ? `<img class="post-img" src="${f.imageUrl}" alt="${escHtml(f.title)}">` : ''}
          <div class="post-body">
            <div class="post-meta">
              <span class="post-date">${fmtDate(f.publishedAt)}</span>
              ${f.bias ? `<span class="bias-pill ${biasClass(f.bias)}">${biasIcon(f.bias)} ${escHtml(f.bias)}</span>` : ''}
            </div>
            <h1 class="post-title">${escHtml(f.title)}</h1>
            ${pairsHtml}
            <div class="post-content">${escHtml(f.content)}</div>
            <div class="post-footer">
              <span class="post-author">by FXNewsBias</span>
              <button class="share-btn" onclick="sharePost(${JSON.stringify(f.title)})">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                Share
              </button>
            </div>
          </div>
        </div>`;

      // Load more forecasts (exclude current)
      const q = query(collection(db, 'forecasts'), orderBy('publishedAt', 'desc'), limit(10));
      const moresnap = await getDocs(q);
      const others = [];
      moresnap.forEach(d => { if (d.id !== postId) others.push({ id: d.id, ...d.data() }); });
      const moreItems = others.slice(0, 4);
      if (moreItems.length) {
        document.getElementById('more-section').style.display = '';
        document.getElementById('more-grid').innerHTML = moreItems.map(m => `
          <a class="more-card" href="/forecast/post/?id=${m.id}">
            ${m.imageUrl
              ? `<img class="more-thumb" src="${m.imageUrl}" alt="${escHtml(m.title)}" loading="lazy">`
              : `<div class="more-thumb-ph">📈</div>`}
            <div class="more-card-body">
              <div class="more-date">${fmtDateShort(m.publishedAt)}</div>
              <div class="more-title">${escHtml(m.title)}</div>
            </div>
          </a>`).join('');
      }
    } catch(e) {
      container.innerHTML = `<div class="error-box"><h3>Failed to load</h3><p>${e.message}</p></div>`;
    }
  })();
}
</script>
</body>
</html>
