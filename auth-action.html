<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://fxnewsbias.com/auth-action">
<title>Reset Password | FXNewsBias</title>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'"><noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f8f9fa;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:16px;padding:40px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.08);text-align:center;}
.logo{font-size:24px;font-weight:800;color:#0f172a;text-decoration:none;display:block;margin-bottom:24px;}
.logo span{color:#2563eb;}
h1{font-size:22px;font-weight:800;margin-bottom:8px;}
p{font-size:14px;color:#6b7280;margin-bottom:24px;}
input{width:100%;padding:12px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:14px;}
input:focus{outline:none;border-color:#2563eb;}
button{width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
button:hover{background:#1d4ed8;}
button:disabled{opacity:0.6;cursor:not-allowed;}
.msg{padding:12px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;}
.msg.success{background:#d1fae5;color:#065f46;}
.msg.error{background:#fee2e2;color:#991b1b;}
.back{display:block;margin-top:16px;color:#2563eb;text-decoration:none;font-size:13px;}
</style>
<style>nav>ul{display:none}.burger{display:flex!important;align-items:center;justify-content:center}</style>
<script>if(localStorage.getItem('fxnb_logged_in')==='true'){var s=document.createElement('style');s.textContent='a[href="/login"],a[href="/register"]{display:none!important}';document.head.appendChild(s);}</script>
<script>(function(){var p=localStorage.getItem("fxnb_is_pro")==="true";if(!p){var s=document.createElement("script");s.async=true;s.src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4857533156344939";s.crossOrigin="anonymous";document.head.appendChild(s);}window.addEventListener("userLoaded",function(e){if(e.detail&&e.detail.isPro){localStorage.setItem("fxnb_is_pro","true");document.querySelectorAll("ins.adsbygoogle,.adsbygoogle,iframe[id^=\"google_ads\"],iframe[src*=\"googleads\"]").forEach(function(el){el.style.display="none";});}else if(e.detail&&e.detail.isPro===false){localStorage.setItem("fxnb_is_pro","false");}});})();</script>
</head>
<body>
<div class="card">
  <a href="/" class="logo"><img src="/logo-fxnb.png" alt="FXNB" width="1600" height="645"><span class="logo-word">FX<em>News</em>Bias</span></a>
  <div id="reset-section">
    <h1>🔐 Reset Password</h1>
    <p>Enter your new password below.</p>
    <div class="msg" id="msg"></div>
    <input type="password" id="new-password" placeholder="New password (min 6 chars)">
    <input type="password" id="confirm-password" placeholder="Confirm new password">
    <button onclick="resetPassword()">Reset Password →</button>
    <a href="/login" class="back">← Back to Login</a>
  </div>
  <div id="success-section" style="display:none;">
    <h1>✅ Password Reset!</h1>
    <p>Your password has been updated successfully.</p>
    <a href="/login"><button>Login Now →</button></a>
  </div>
  <div id="error-section" style="display:none;">
    <h1>❌ Link Expired</h1>
    <p>This reset link has expired or already been used.</p>
    <a href="/login"><button>Back to Login</button></a>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, confirmPasswordReset, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const app = getApps().length ? getApps()[0] : initializeApp({
  apiKey: "AIzaSyD88nfD-GSk2icxgPMqOHOuLjCM19Zzso4",
  authDomain: "fxnewsbias.firebaseapp.com",
  projectId: "fxnewsbias",
  storageBucket: "fxnewsbias.firebasestorage.app",
  messagingSenderId: "414710041736",
  appId: "1:414710041736:web:00e79ccc58fdb94e98633d"
});
const auth = getAuth(app);

const params = new URLSearchParams(window.location.search);
const oobCode = params.get('oobCode');
const mode = params.get('mode');

if (!oobCode || mode !== 'resetPassword') {
  document.getElementById('reset-section').style.display = 'none';
  document.getElementById('error-section').style.display = 'block';
} else {
  verifyPasswordResetCode(auth, oobCode).catch(() => {
    document.getElementById('reset-section').style.display = 'none';
    document.getElementById('error-section').style.display = 'block';
  });
}

window.resetPassword = async function() {
  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  const msg = document.getElementById('msg');

  if (!newPass || newPass.length < 6) {
    msg.className = 'msg error'; msg.style.display = 'block';
    msg.textContent = 'Password must be at least 6 characters!'; return;
  }
  if (newPass !== confirmPass) {
    msg.className = 'msg error'; msg.style.display = 'block';
    msg.textContent = 'Passwords do not match!'; return;
  }

  const btn = document.querySelector('button');
  btn.disabled = true; btn.textContent = 'Resetting...';

  try {
    await confirmPasswordReset(auth, oobCode, newPass);
    document.getElementById('reset-section').style.display = 'none';
    document.getElementById('success-section').style.display = 'block';
  } catch(e) {
    msg.className = 'msg error'; msg.style.display = 'block';
    msg.textContent = 'Error: ' + e.message;
    btn.disabled = false; btn.textContent = 'Reset Password →';
  }
}
</script>
</body>
</html>
