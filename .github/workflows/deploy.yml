name: Deploy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          OUT=$(npx wrangler@4 deploy 2>&1)
          EC=$?
          echo "$OUT"
          if echo "$OUT" | grep -q "Uploaded fxnewsbias"; then
            echo "::notice::Worker assets deployed successfully"
            exit 0
          fi
          exit $EC
